services:
  lumina-backend-blue:
    image: ghcr.io/shaphankirui/lumina-backend:${IMAGE_TAG:-latest}
    container_name: lumina-backend-blue
    restart: unless-stopped
    network_mode: host
    env_file:
      - ../apps/backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001/",
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  lumina-frontend-blue:
    image: ghcr.io/shaphankirui/lumina-frontend:${IMAGE_TAG:-latest}
    container_name: lumina-frontend-blue
    restart: unless-stopped
    ports:
      - "4001:80"
    networks:
      - lumina-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:80/health",
        ]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

networks:
  lumina-network:
    name: lumina-network
    driver: bridge

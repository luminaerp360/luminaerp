<!--
  EXAMPLE: User List Template with Global CRUD Permissions

  This shows how to conditionally render UI elements based on permissions
-->

<div class="container mx-auto p-6">
  <!-- Header with Create Button -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">Users Management</h1>

    <!-- CREATE Button - Only show if user has create permission -->
    <button
      *ngIf="canCreateUser"
      (click)="openCreateModal()"
      class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded"
    >
      <i class="material-icons">add</i>
      Add New User
    </button>

    <!-- Alternative: Show disabled button with tooltip -->
    <button
      *ngIf="!canCreateUser"
      disabled
      title="You don't have permission to create users"
      class="bg-gray-400 text-white px-4 py-2 rounded cursor-not-allowed"
    >
      <i class="material-icons">add</i>
      Add New User
    </button>
  </div>

  <!-- Loading Spinner -->
  <div *ngIf="isLoading" class="text-center py-8">
    <div class="spinner-border" role="status">
      <span class="sr-only">Loading...</span>
    </div>
  </div>

  <!-- No Permission Message -->
  <div *ngIf="!canViewUsers" class="text-center py-8">
    <p class="text-red-500">You don't have permission to view users</p>
  </div>

  <!-- Users Table - Only show if user can view -->
  <div *ngIf="canViewUsers && !isLoading">
    <table class="min-w-full bg-white">
      <thead class="bg-gray-800 text-white">
        <tr>
          <th class="py-3 px-4 text-left">Name</th>
          <th class="py-3 px-4 text-left">Email</th>
          <th class="py-3 px-4 text-left">Role</th>
          <th class="py-3 px-4 text-left">Phone</th>
          <!-- Only show Actions column if user can update or delete -->
          <th *ngIf="canUpdateUser || canDeleteUser" class="py-3 px-4 text-left">
            Actions
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users" class="border-b hover:bg-gray-50">
          <td class="py-3 px-4">{{ user.fullName }}</td>
          <td class="py-3 px-4">{{ user.email }}</td>
          <td class="py-3 px-4">{{ user.role }}</td>
          <td class="py-3 px-4">{{ user.phone }}</td>

          <!-- Actions Column -->
          <td *ngIf="canUpdateUser || canDeleteUser" class="py-3 px-4">
            <div class="flex space-x-2">
              <!-- EDIT Button - Only show if user has update permission -->
              <button
                *ngIf="canUpdateUser"
                (click)="editUser(user)"
                class="bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-1 rounded text-sm"
                title="Edit user"
              >
                <i class="material-icons text-sm">edit</i>
                Edit
              </button>

              <!-- PERMISSIONS Button - Only show if user has update permission -->
              <button
                *ngIf="canUpdateUser"
                (click)="openPermissionDialog(user)"
                class="bg-indigo-500 hover:bg-indigo-600 text-white px-3 py-1 rounded text-sm"
                title="Manage permissions"
              >
                <i class="material-icons text-sm">security</i>
                Permissions
              </button>

              <!-- DELETE Button - Only show if user has delete permission -->
              <button
                *ngIf="canDeleteUser"
                (click)="deleteUser(user.id)"
                class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm"
                title="Delete user"
              >
                <i class="material-icons text-sm">delete</i>
                Delete
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- Empty State -->
    <div *ngIf="users.length === 0" class="text-center py-8">
      <p class="text-gray-500">No users found</p>
    </div>
  </div>
</div>

<!--
  KEY POINTS:

  1. CREATE button: *ngIf="canCreateUser"
  2. EDIT button: *ngIf="canUpdateUser"
  3. DELETE button: *ngIf="canDeleteUser"
  4. VIEW check: Done in component ngOnInit
  5. Actions column: Only show if user has update OR delete permissions
  6. All action handlers check permissions before executing
-->

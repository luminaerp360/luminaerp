<div class="min-h-screen bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-200 p-4 md:p-6">

  <!-- Header -->
  <div class="mb-6">
    <h2 class="text-2xl font-bold text-gray-900 dark:text-white">User Activity History</h2>
    <p class="text-gray-500 dark:text-gray-400 mt-1" *ngIf="activities.length > 0">
      Activity history for {{ getUserName(activities[0]) }}
    </p>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="flex items-center justify-center py-16">
    <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent"></div>
  </div>

  <!-- No Activities -->
  <div *ngIf="!isLoading && activities.length === 0" class="bg-white dark:bg-slate-900 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm">
    <div class="text-center py-16">
      <i class="bi bi-inbox text-5xl text-gray-300 dark:text-gray-600"></i>
      <p class="text-gray-500 dark:text-gray-400 mt-3 text-lg">No activity found for this user</p>
    </div>
  </div>

  <!-- Timeline -->
  <div *ngIf="!isLoading && activities.length > 0" class="bg-white dark:bg-slate-900 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm p-5">
    <div class="timeline">
      <div class="timeline-item" *ngFor="let activity of activities">
        <div class="timeline-marker"></div>
        <div class="timeline-content">
          <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-2">
            <div>
              <div class="flex flex-wrap items-center gap-2 mb-1">
                <span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium text-white" [ngClass]="getActionClass(activity.action)">
                  {{ activity.action }}
                </span>
                <span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-200 dark:bg-slate-900 text-gray-700 dark:text-gray-200">{{ activity.module }}</span>
              </div>
              <p class="text-sm text-gray-700 dark:text-gray-300 mb-1">{{ activity.description }}</p>
              <div class="flex flex-wrap items-center gap-3 text-xs text-gray-400 dark:text-gray-500">
                <span><i class="bi bi-clock mr-1"></i>{{ formatDate(activity.createdAt) }}</span>
                <span *ngIf="activity.ipAddress"><i class="bi bi-geo-alt mr-1"></i>{{ activity.ipAddress }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Backdrop -->
<div
  tabindex="-1"
  aria-hidden="true"
  class="fixed inset-0 z-50 flex items-end sm:items-center justify-center overflow-y-auto backdrop-blur-sm bg-black/40 transition-opacity"
>
  <!-- Modal Container -->
  <div class="relative w-full max-w-md mx-4 animate-slideIn">
    <div
      class="relative bg-gradient-to-br from-white to-purple-50 dark:from-slate-900 dark:to-slate-900 rounded-t-2xl sm:rounded-2xl shadow-2xl border border-purple-100 dark:border-gray-700"
    >
      <!-- Modal Header -->
      <div class="bg-gradient-to-r from-purple-600 to-indigo-600 shadow-lg shadow-purple-500/20 transition-all duration-300 rounded-t-2xl">
        <div class="flex justify-between items-center p-4 sm:p-6">
          <h3 class="text-lg sm:text-2xl font-black text-white uppercase tracking-[0.1em]">
            {{ isUpdateMode ? "Update" : "Add" }} Store Category
          </h3>

          <button
            (click)="closeModal()"
            type="button"
            class="text-white/80 hover:text-white hover:bg-white/10 rounded-full p-2 transition-colors focus:outline-none focus:ring-2 focus:ring-white/50"
          >
            <svg
              class="w-5 h-5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
            <span class="sr-only">Close modal</span>
          </button>
        </div>
      </div>

      <!-- Form -->
      <form
        [formGroup]="categoryForm"
        (ngSubmit)="submit()"
        class="p-4 sm:p-6 space-y-6"
      >
        <!-- Name Field -->
        <div class="space-y-2">
          <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
            Name
            <span class="text-red-500">*</span>
          </label>
          <input
            id="name"
            type="text"
            formControlName="name"
            placeholder="Enter store category name"
            class="w-full text-gray-900 dark:text-gray-100 px-4 py-2.5 rounded-lg border border-purple-200 dark:border-gray-600 focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition-all bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm"
            [ngClass]="{
              'border-red-500 focus:ring-red-500':
                categoryForm.get('name')?.invalid &&
                categoryForm.get('name')?.touched
            }"
          />
          <div
            *ngIf="
              categoryForm.get('name')?.invalid &&
              (categoryForm.get('name')?.dirty ||
                categoryForm.get('name')?.touched)
            "
            class="text-sm text-red-500 mt-1 animate-fadeIn"
          >
            Store category name is required
          </div>
        </div>

        <!-- Description Field -->
        <div class="space-y-2">
          <label
            for="description"
            class="block text-sm font-medium text-gray-700 dark:text-gray-300"
          >
            Description
          </label>
          <textarea
            id="description"
            formControlName="description"
            rows="3"
            placeholder="Enter store category description"
            class="w-full text-gray-900 dark:text-gray-100 px-4 py-2.5 rounded-lg border border-purple-200 dark:border-gray-600 focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition-all bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm resize-none"
          ></textarea>
        </div>

        <!-- Submit Button -->
        <div class="pt-4">
          <button
            type="submit"
            [disabled]="categoryForm.invalid"
            class="w-full py-2.5 px-4 rounded-lg font-medium text-white bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 focus:ring-2 focus:ring-purple-500 focus:ring-offset-2 transition-all disabled:opacity-50 disabled:cursor-not-allowed transform hover:-translate-y-0.5 active:translate-y-0"
          >
            {{ isUpdateMode ? "Update" : "Add" }} Store Category
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<div
  tabindex="-1"
  aria-hidden="true"
  class="fixed inset-0 z-50 flex items-end sm:items-center justify-center overflow-y-auto backdrop-blur-sm bg-black/40 transition-opacity"
>
  <div
    class="relative w-full max-w-4xl mx-4 animate-slideIn max-h-[85vh] sm:max-h-[90vh] overflow-y-auto"
  >
    <div
      class="relative bg-gradient-to-br from-white to-purple-50 dark:from-slate-900 dark:to-slate-900 rounded-t-2xl sm:rounded-2xl shadow-2xl border border-purple-100 dark:border-gray-700"
    >
      <!-- Sticky Header -->
      <div
        class="sticky top-0 z-10 bg-gradient-to-r from-purple-600 to-indigo-600 shadow-lg shadow-purple-500/20 rounded-t-2xl"
      >
        <div class="flex justify-between items-center p-4 sm:p-6">
          <h3
            class="text-lg sm:text-2xl font-black text-white uppercase tracking-[0.1em]"
          >
            {{ isUpdateMode ? "Update" : "New" }} Purchase Order
          </h3>
          <button
            (click)="closeModal()"
            type="button"
            class="text-white/80 hover:text-white hover:bg-white/10 rounded-full p-2 transition-colors"
          >
            <svg
              class="w-5 h-5"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
      </div>

      <form
        [formGroup]="purchaseForm"
        (ngSubmit)="submit()"
        class="p-4 sm:p-6 space-y-6"
      >
        <!-- Top Fields -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="space-y-2">
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300"
              >Supplier</label
            >
            <select
              formControlName="supplierId"
              class="w-full text-gray-900 dark:text-gray-100 px-4 py-2.5 rounded-lg border border-purple-200 dark:border-gray-600 focus:ring-2 focus:ring-purple-500 outline-none bg-white/50 dark:bg-slate-900/50"
            >
              <option value="">Select Supplier (Optional)</option>
              <option *ngFor="let supplier of suppliers" [value]="supplier.id">
                {{ supplier.name }} — {{ supplier.phone }}
              </option>
            </select>
          </div>
          <div class="space-y-2">
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300"
              >Received By<span class="text-red-500">*</span></label
            >
            <input
              type="text"
              formControlName="receivedBy"
              placeholder="Receiver name"
              class="w-full text-gray-900 dark:text-gray-100 px-4 py-2.5 rounded-lg border border-purple-200 dark:border-gray-600 focus:ring-2 focus:ring-purple-500 outline-none bg-white/50 dark:bg-slate-900/50"
            />
          </div>
          <div class="space-y-2">
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300"
              >Delivery Date</label
            >
            <input
              type="date"
              formControlName="deliveryDate"
              class="w-full text-gray-900 dark:text-gray-100 px-4 py-2.5 rounded-lg border border-purple-200 dark:border-gray-600 focus:ring-2 focus:ring-purple-500 outline-none bg-white/50 dark:bg-slate-900/50"
            />
          </div>
          <div class="space-y-2">
            <label
              class="block text-sm font-medium text-gray-700 dark:text-gray-300"
              >Notes</label
            >
            <input
              type="text"
              formControlName="notes"
              placeholder="Optional notes"
              class="w-full text-gray-900 dark:text-gray-100 px-4 py-2.5 rounded-lg border border-purple-200 dark:border-gray-600 focus:ring-2 focus:ring-purple-500 outline-none bg-white/50 dark:bg-slate-900/50"
            />
          </div>
        </div>

        <!-- Items Section -->
        <div class="space-y-3">
          <div class="flex items-center justify-between">
            <h4 class="text-lg font-semibold text-gray-900 dark:text-gray-100">
              Items
            </h4>
            <button
              type="button"
              (click)="addItem()"
              class="flex items-center gap-1 px-3 py-1.5 text-sm text-purple-600 dark:text-purple-400 bg-purple-100 dark:bg-purple-900/30 rounded-lg hover:bg-purple-200 dark:hover:bg-purple-900/50 transition-colors"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 6v6m0 0v6m0-6h6m-6 0H6"
                />
              </svg>
              Add Item
            </button>
          </div>

          <!-- Items Table (Desktop) -->
          <div
            class="hidden sm:block overflow-x-auto rounded-lg border border-gray-200 dark:border-gray-700"
          >
            <table
              class="min-w-full divide-y divide-gray-200 dark:divide-gray-700"
            >
              <thead class="bg-gray-50 dark:bg-slate-800">
                <tr>
                  <th
                    class="px-3 py-2 text-xs font-semibold text-left text-gray-600 dark:text-gray-300 uppercase w-2/5"
                  >
                    Product
                  </th>
                  <th
                    class="px-3 py-2 text-xs font-semibold text-left text-gray-600 dark:text-gray-300 uppercase"
                  >
                    Quantity
                  </th>
                  <th
                    class="px-3 py-2 text-xs font-semibold text-left text-gray-600 dark:text-gray-300 uppercase"
                  >
                    Unit Price (KSH)
                  </th>
                  <th
                    class="px-3 py-2 text-xs font-semibold text-right text-gray-600 dark:text-gray-300 uppercase"
                  >
                    Line Total
                  </th>
                  <th
                    class="px-3 py-2 text-xs font-semibold text-center text-gray-600 dark:text-gray-300 uppercase w-16"
                  ></th>
                </tr>
              </thead>
              <tbody
                formArrayName="items"
                class="divide-y divide-gray-100 dark:divide-gray-700 bg-white dark:bg-slate-900"
              >
                <tr
                  *ngFor="let item of items.controls; let i = index"
                  [formGroupName]="i"
                >
                  <td class="px-3 py-2">
                    <select
                      formControlName="storeProductId"
                      class="w-full text-sm text-gray-900 dark:text-gray-100 px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 focus:ring-2 focus:ring-purple-500 outline-none bg-white dark:bg-slate-800"
                    >
                      <option value="">Select Product</option>
                      <option
                        *ngFor="let product of storeProducts"
                        [value]="product.id"
                      >
                        {{ product.productName }} ({{ product.quantity }}
                        avail.)
                      </option>
                    </select>
                  </td>
                  <td class="px-3 py-2">
                    <input
                      type="number"
                      formControlName="quantity"
                      placeholder="0"
                      min="1"
                      class="w-full text-sm text-gray-900 dark:text-gray-100 px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 focus:ring-2 focus:ring-purple-500 outline-none bg-white dark:bg-slate-800"
                    />
                  </td>
                  <td class="px-3 py-2">
                    <input
                      type="number"
                      formControlName="unitPrice"
                      placeholder="0.00"
                      step="0.01"
                      min="0"
                      class="w-full text-sm text-gray-900 dark:text-gray-100 px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 focus:ring-2 focus:ring-purple-500 outline-none bg-white dark:bg-slate-800"
                    />
                  </td>
                  <td class="px-3 py-2 text-right">
                    <span
                      class="text-sm font-semibold text-gray-900 dark:text-gray-100"
                      >KSH {{ getItemTotal(i) | number: "1.2-2" }}</span
                    >
                  </td>
                  <td class="px-3 py-2 text-center">
                    <button
                      *ngIf="items.length > 1"
                      type="button"
                      (click)="removeItem(i)"
                      class="p-1 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded transition-colors"
                    >
                      <svg
                        class="w-4 h-4"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                        />
                      </svg>
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Mobile Items Cards -->
          <div class="sm:hidden space-y-3" formArrayName="items">
            <div
              *ngFor="let item of items.controls; let i = index"
              [formGroupName]="i"
              class="rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-slate-900 p-3 space-y-3"
            >
              <div class="flex items-center justify-between">
                <span
                  class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase"
                  >Item {{ i + 1 }}</span
                >
                <button
                  *ngIf="items.length > 1"
                  type="button"
                  (click)="removeItem(i)"
                  class="p-1 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded transition-colors"
                >
                  <svg
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                    />
                  </svg>
                </button>
              </div>
              <div>
                <label
                  class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1"
                  >Product</label
                >
                <select
                  formControlName="storeProductId"
                  class="w-full text-sm text-gray-900 dark:text-gray-100 px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 focus:ring-2 focus:ring-purple-500 outline-none bg-white dark:bg-slate-800"
                >
                  <option value="">Select Product</option>
                  <option
                    *ngFor="let product of storeProducts"
                    [value]="product.id"
                  >
                    {{ product.productName }} ({{ product.quantity }} avail.)
                  </option>
                </select>
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label
                    class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1"
                    >Quantity</label
                  >
                  <input
                    type="number"
                    formControlName="quantity"
                    placeholder="0"
                    min="1"
                    class="w-full text-sm text-gray-900 dark:text-gray-100 px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 focus:ring-2 focus:ring-purple-500 outline-none bg-white dark:bg-slate-800"
                  />
                </div>
                <div>
                  <label
                    class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1"
                    >Unit Price (KSH)</label
                  >
                  <input
                    type="number"
                    formControlName="unitPrice"
                    placeholder="0.00"
                    step="0.01"
                    min="0"
                    class="w-full text-sm text-gray-900 dark:text-gray-100 px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 focus:ring-2 focus:ring-purple-500 outline-none bg-white dark:bg-slate-800"
                  />
                </div>
              </div>
              <div
                class="flex justify-between items-center pt-1 border-t border-gray-100 dark:border-gray-700"
              >
                <span class="text-xs text-gray-500 dark:text-gray-400"
                  >Line Total</span
                >
                <span
                  class="text-sm font-semibold text-purple-700 dark:text-purple-300"
                  >KSH {{ getItemTotal(i) | number: "1.2-2" }}</span
                >
              </div>
            </div>
          </div>

          <!-- Grand Total -->
          <div class="flex justify-end">
            <div
              class="bg-purple-50 dark:bg-purple-900/20 px-6 py-3 rounded-lg border border-purple-200 dark:border-purple-800"
            >
              <span class="text-sm text-gray-600 dark:text-gray-400"
                >Grand Total:</span
              >
              <span
                class="ml-2 text-lg font-bold text-purple-700 dark:text-purple-300"
                >KSH {{ getGrandTotal() | number: "1.2-2" }}</span
              >
            </div>
          </div>
        </div>

        <!-- Submit -->
        <div class="pt-4">
          <button
            type="submit"
            [disabled]="purchaseForm.invalid || items.length === 0 || loading"
            class="w-full py-2.5 px-4 rounded-lg font-medium text-white bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 focus:ring-2 focus:ring-purple-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
          >
            <span *ngIf="!loading"
              >{{ isUpdateMode ? "Update" : "Create" }} Purchase Order</span
            >
            <span *ngIf="loading">Processing...</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

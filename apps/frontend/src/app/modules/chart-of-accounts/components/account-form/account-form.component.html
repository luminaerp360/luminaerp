<div class="bg-white dark:bg-slate-900 rounded-lg p-6 max-w-2xl mx-auto">
  <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-6">
    {{ mode === 'create' ? 'Add New Account' : 'Edit Account' }}
  </h2>

  <form [formGroup]="accountForm" (ngSubmit)="onSubmit()">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
      <!-- Account Code -->
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
          >Account Code *</label
        >
        <input
          type="text"
          formControlName="accountCode"
          placeholder="e.g., 1015"
          class="w-full bg-white dark:bg-slate-900 border border-gray-300 dark:border-gray-600 rounded-md px-4 py-2 text-gray-900 dark:text-gray-300 placeholder-gray-500 dark:placeholder-gray-400 focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
        />
        <p
          *ngIf="
            accountForm.get('accountCode')?.invalid &&
            accountForm.get('accountCode')?.touched
          "
          class="text-red-600 dark:text-red-400 text-xs mt-1"
        >
          Account code is required (3-10 characters)
        </p>
      </div>

      <!-- Account Name -->
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
          >Account Name *</label
        >
        <input
          type="text"
          formControlName="accountName"
          placeholder="e.g., Mobile Money"
          class="w-full bg-white dark:bg-slate-900 border border-gray-300 dark:border-gray-600 rounded-md px-4 py-2 text-gray-900 dark:text-gray-300 placeholder-gray-500 dark:placeholder-gray-400 focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
        />
        <p
          *ngIf="
            accountForm.get('accountName')?.invalid &&
            accountForm.get('accountName')?.touched
          "
          class="text-red-600 dark:text-red-400 text-xs mt-1"
        >
          Account name is required
        </p>
      </div>

      <!-- Account Type -->
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
          >Account Type *</label
        >
        <select
          formControlName="accountType"
          class="w-full bg-white dark:bg-slate-900 border border-gray-300 dark:border-gray-600 rounded-md px-4 py-2 text-gray-900 dark:text-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
        >
          <option *ngFor="let type of accountTypes" [value]="type">
            {{ type }}
          </option>
        </select>
      </div>

      <!-- Account Category -->
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
          >Account Category *</label
        >
        <select
          formControlName="accountCategory"
          class="w-full bg-white dark:bg-slate-900 border border-gray-300 dark:border-gray-600 rounded-md px-4 py-2 text-gray-900 dark:text-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
        >
          <option value="">Select Category</option>
          <option
            *ngFor="let category of filteredCategories"
            [value]="category"
          >
            {{ formatCategory(category) }}
          </option>
        </select>
      </div>

      <!-- Balance Type -->
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
          >Balance Type *</label
        >
        <select
          formControlName="balanceType"
          class="w-full bg-white dark:bg-slate-900 border border-gray-300 dark:border-gray-600 rounded-md px-4 py-2 text-gray-900 dark:text-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
        >
          <option *ngFor="let type of balanceTypes" [value]="type">
            {{ type }}
          </option>
        </select>
      </div>

      <!-- Active Status -->
      <div class="flex items-center pt-6">
        <label class="flex items-center space-x-2 cursor-pointer">
          <input
            type="checkbox"
            formControlName="isActive"
            class="w-4 h-4 text-indigo-600 bg-gray-100 dark:bg-slate-900 border-gray-300 dark:border-gray-600 rounded focus:ring-indigo-500"
          />
          <span class="text-sm text-gray-700 dark:text-gray-300">Active</span>
        </label>
      </div>
    </div>

    <!-- Description -->
    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
        >Description</label
      >
      <textarea
        formControlName="description"
        rows="3"
        placeholder="Optional description..."
        class="w-full bg-white dark:bg-slate-900 border border-gray-300 dark:border-gray-600 rounded-md px-4 py-2 text-gray-900 dark:text-gray-300 placeholder-gray-500 dark:placeholder-gray-400 focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
      ></textarea>
    </div>

    <!-- Action Buttons -->
    <div class="flex justify-end gap-3">
      <button
        type="button"
        (click)="close()"
        class="px-4 py-2 bg-gray-200 dark:bg-slate-900 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-300 dark:hover:bg-slate-900 transition-colors"
      >
        Cancel
      </button>
      <button
        type="submit"
        [disabled]="loading || accountForm.invalid"
        class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      >
        {{ loading ? 'Saving...' : (mode === 'create' ? 'Create Account' : 'Update Account') }}
      </button>
    </div>
  </form>
</div>

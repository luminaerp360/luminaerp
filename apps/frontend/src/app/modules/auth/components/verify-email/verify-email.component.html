<div
  class="min-h-screen bg-gradient-to-br from-gray-50 via-blue-50/30 to-gray-50 dark:from-slate-900 dark:via-blue-900/20 dark:to-slate-900 flex items-center justify-center px-4"
>
  <div class="w-full max-w-md">
    <div
      class="bg-white/90 dark:bg-white/10 backdrop-blur-xl rounded-3xl shadow-2xl border border-gray-200 dark:border-white/20 p-8 sm:p-10 text-center"
    >
      <!-- Logo -->
      <div class="mb-8">
        <img
          src="assets/images/logo.png"
          alt="Lumina ERP"
          class="h-20 w-auto object-contain mx-auto"
        />
      </div>

      <!-- Verifying -->
      <ng-container *ngIf="state === 'verifying'">
        <div
          class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 rounded-full flex items-center justify-center mx-auto mb-6"
        >
          <svg
            class="animate-spin w-8 h-8 text-blue-600 dark:text-blue-400"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            ></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
            ></path>
          </svg>
        </div>
        <h2 class="text-xl font-bold text-gray-900 dark:text-white">
          Verifying your email...
        </h2>
        <p class="text-gray-500 dark:text-gray-400 mt-2">
          Please wait a moment.
        </p>
      </ng-container>

      <!-- Success -->
      <ng-container *ngIf="state === 'success'">
        <div
          class="w-16 h-16 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-6"
        >
          <svg
            class="w-8 h-8 text-green-600 dark:text-green-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-3">
          Email Verified!
        </h2>
        <p class="text-gray-600 dark:text-gray-300 mb-8">
          Your email has been verified successfully. Your
          <strong>free 3-month trial</strong> is now active!
        </p>
        <button
          (click)="goToLogin()"
          class="w-full py-3 px-6 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-semibold rounded-xl shadow-lg transition-all duration-200"
        >
          Sign In to Your Account
        </button>
      </ng-container>

      <!-- Error -->
      <ng-container *ngIf="state === 'error'">
        <div
          class="w-16 h-16 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center mx-auto mb-6"
        >
          <svg
            class="w-8 h-8 text-red-600 dark:text-red-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"
            />
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-3">
          Verification Failed
        </h2>
        <p class="text-gray-600 dark:text-gray-300 mb-8">{{ errorMessage }}</p>
        <div class="space-y-3">
          <button
            (click)="goToRegister()"
            class="w-full py-3 px-6 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-semibold rounded-xl shadow-lg transition-all duration-200"
          >
            Register Again
          </button>
          <button
            (click)="goToLogin()"
            class="w-full py-3 px-6 bg-gray-100 dark:bg-white/5 hover:bg-gray-200 dark:hover:bg-white/10 text-gray-700 dark:text-gray-300 font-semibold rounded-xl transition-all duration-200"
          >
            Back to Login
          </button>
        </div>
      </ng-container>
    </div>
  </div>
</div>

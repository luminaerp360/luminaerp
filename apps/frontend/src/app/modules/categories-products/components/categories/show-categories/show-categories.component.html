<section class="min-h-screen bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100">
  <!-- Loading State -->
  <div
    *ngIf="loading"
    class="fixed inset-0 bg-gray-50 dark:bg-slate-900 bg-opacity-50 flex items-center justify-center z-50"
  >
    <div class="flex flex-col items-center">
      <div
        class="w-12 h-12 border-t-2 border-blue-500 border-solid rounded-full animate-spin"
      ></div>
      <p class="mt-4 text-blue-500">Loading categories...</p>
    </div>
  </div>

  <div class="container px-3 sm:px-4 mx-auto py-4 sm:py-8">
    <!-- Search Bar -->
    <div class="relative mb-4 sm:mb-6">
      <input
        (input)="onInputChange()"
        type="text"
        placeholder="Search categories..."
        [(ngModel)]="query"
        class="w-full h-10 sm:h-12 px-4 pl-10 rounded-lg text-sm text-gray-700 dark:text-gray-300 bg-white dark:bg-slate-900 border border-gray-300 dark:border-gray-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-colors"
      />
      <svg
        class="w-5 h-5 absolute left-3 top-2.5 sm:top-3.5 text-gray-500 dark:text-gray-400"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
        />
      </svg>
    </div>

    <!-- Header Section -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-4 sm:mb-6">
      <div class="flex items-center gap-x-3 mb-3 sm:mb-0">
        <h2 class="text-lg sm:text-xl font-semibold text-gray-900 dark:text-gray-100">Categories</h2>
        <span class="px-3 py-1 text-xs text-blue-400 bg-blue-900/50 rounded-full">
          {{ categories.length }} Categories
        </span>
      </div>

      <div class="flex gap-3">
        <button
          class="flex-1 sm:flex-none flex items-center justify-center px-4 py-2 text-sm text-gray-700 dark:text-gray-300 bg-white dark:bg-slate-900 rounded-lg hover:bg-gray-50 dark:hover:bg-slate-800 transition-colors duration-200 gap-x-2"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
          </svg>
          <span>Import</span>
        </button>

        <button
          (click)="openAddDialog()"
          class="flex-1 sm:flex-none flex items-center justify-center px-4 py-2 text-sm text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors duration-200 gap-x-2"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
          </svg>
          <span>Add Category</span>
        </button>
      </div>
    </div>

    <!-- Table Section (Desktop) -->
    <div class="hidden sm:block bg-white dark:bg-slate-900 rounded-lg shadow-xl overflow-hidden border border-gray-200 dark:border-gray-700">
      <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="bg-gradient-to-r from-purple-600 to-indigo-600 shadow-lg shadow-purple-500/20 transition-all duration-300">
          <tr>
            <th class="px-6 py-4 text-xs font-black text-left text-white uppercase tracking-[0.1em]">Category Name</th>
            <th class="px-6 py-4 text-xs font-black text-left text-white uppercase tracking-[0.1em]">Status</th>
            <th class="px-6 py-4 text-xs font-black text-left text-white uppercase tracking-[0.1em]">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
          <tr *ngFor="let category of categories" class="hover:bg-gray-50 dark:hover:bg-slate-800 transition-colors duration-200">
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="text-sm font-medium text-gray-900 dark:text-gray-100">{{ category.name }}</div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <span class="px-3 py-1 text-sm text-emerald-400 bg-emerald-900/30 rounded-full">Active</span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium space-x-2">
              <button (click)="openUpdateDialog(category)" class="px-3 py-1 text-blue-400 bg-blue-900/30 rounded hover:bg-blue-900/50 transition-colors duration-200">Update</button>
              <button (click)="deleteCategory(category.id)" class="px-3 py-1 text-red-400 bg-red-900/30 rounded hover:bg-red-900/50 transition-colors duration-200">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Cards Section (Mobile) -->
    <div class="sm:hidden space-y-3">
      <div *ngFor="let category of categories" class="bg-white dark:bg-slate-900 rounded-lg shadow border border-gray-200 dark:border-gray-700 p-4">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3 flex-1 min-w-0">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-r from-purple-600 to-indigo-600 flex items-center justify-center flex-shrink-0">
              <span class="text-white font-bold text-sm">{{ category.name.charAt(0).toUpperCase() }}</span>
            </div>
            <div class="min-w-0">
              <p class="text-sm font-semibold text-gray-900 dark:text-white truncate">{{ category.name }}</p>
              <span class="text-xs text-emerald-400">Active</span>
            </div>
          </div>
          <div class="flex gap-2 flex-shrink-0 ml-2">
            <button (click)="openUpdateDialog(category)" class="p-2 text-blue-400 bg-blue-900/30 rounded-lg hover:bg-blue-900/50 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
            </button>
            <button (click)="deleteCategory(category.id)" class="p-2 text-red-400 bg-red-900/30 rounded-lg hover:bg-red-900/50 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Empty state -->
      <div *ngIf="categories.length === 0" class="text-center py-8">
        <p class="text-sm text-gray-500 dark:text-gray-400">No categories found</p>
      </div>
    </div>
  </div>
</section>

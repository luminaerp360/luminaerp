<div
  class="min-h-screen bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-slate-200"
>
  <!-- Header -->
  <div
    class="px-4 py-6 md:px-8 bg-white dark:bg-slate-900 border-b border-gray-200 dark:border-slate-700"
  >
    <div class="max-w-7xl mx-auto">
      <h1
        class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white flex items-center"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6 sm:h-8 sm:w-8 mr-2 sm:mr-3 text-purple-500 flex-shrink-0"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
        </svg>
        Reports & Analytics
      </h1>
      <p class="text-gray-600 dark:text-slate-400 mt-1">
        Comprehensive business intelligence across all modules
      </p>
    </div>
  </div>

  <!-- Report Cards Grid -->
  <div class="max-w-7xl mx-auto px-3 sm:px-4 md:px-8 py-4 sm:py-8">
    <div
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 sm:gap-6"
    >
      <div
        *ngFor="let card of reportCards"
        (click)="navigateTo(card.route)"
        class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-gray-200 dark:border-slate-700 p-4 sm:p-6 cursor-pointer hover:shadow-lg hover:border-purple-300 dark:hover:border-purple-600 transition-all duration-200 group"
      >
        <!-- Icon -->
        <div
          [class]="
            card.bgColor +
            ' w-12 h-12 rounded-lg flex items-center justify-center mb-4 group-hover:scale-110 transition-transform'
          "
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            [class]="'h-6 w-6 ' + card.color"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path [attr.d]="card.icon"></path>
          </svg>
        </div>
        <!-- Text -->
        <h3
          class="text-lg font-semibold text-gray-900 dark:text-white mb-2 group-hover:text-purple-600 dark:group-hover:text-purple-400 transition-colors"
        >
          {{ card.title }}
        </h3>
        <p class="text-sm text-gray-600 dark:text-slate-400 leading-relaxed">
          {{ card.description }}
        </p>
        <!-- Arrow -->
        <div
          class="mt-4 flex items-center text-purple-600 dark:text-purple-400 text-sm font-medium opacity-0 group-hover:opacity-100 transition-opacity"
        >
          View Report
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4 ml-1"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M5 12h14M12 5l7 7-7 7"></path>
          </svg>
        </div>
      </div>
    </div>

    <!-- Quick access to legacy reports -->
    <div class="mt-6 sm:mt-10 border-t border-gray-200 dark:border-slate-700 pt-4 sm:pt-6">
      <h2 class="text-base sm:text-lg font-semibold text-gray-900 dark:text-white mb-3 sm:mb-4">
        Legacy Reports
      </h2>
      <div class="flex flex-wrap gap-2 sm:gap-3">
        <a
          routerLink="/sale-reports"
          class="px-4 py-2 text-sm bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-slate-300 rounded-lg hover:bg-purple-100 dark:hover:bg-purple-900/30 hover:text-purple-700 dark:hover:text-purple-300 transition-colors"
        >
          Sales Reports (Classic)
        </a>
        <a
          routerLink="/income-reports"
          class="px-4 py-2 text-sm bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-slate-300 rounded-lg hover:bg-purple-100 dark:hover:bg-purple-900/30 hover:text-purple-700 dark:hover:text-purple-300 transition-colors"
        >
          Income Reports
        </a>
        <a
          routerLink="/purchase-reports"
          class="px-4 py-2 text-sm bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-slate-300 rounded-lg hover:bg-purple-100 dark:hover:bg-purple-900/30 hover:text-purple-700 dark:hover:text-purple-300 transition-colors"
        >
          Purchase Reports
        </a>
        <a
          routerLink="/credit-reports"
          class="px-4 py-2 text-sm bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-slate-300 rounded-lg hover:bg-purple-100 dark:hover:bg-purple-900/30 hover:text-purple-700 dark:hover:text-purple-300 transition-colors"
        >
          Credit Reports
        </a>
        <a
          routerLink="/voids-reports"
          class="px-4 py-2 text-sm bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-slate-300 rounded-lg hover:bg-purple-100 dark:hover:bg-purple-900/30 hover:text-purple-700 dark:hover:text-purple-300 transition-colors"
        >
          Voided Sales
        </a>
      </div>
    </div>
  </div>
</div>

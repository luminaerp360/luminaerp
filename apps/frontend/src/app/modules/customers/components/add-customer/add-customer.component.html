<div
  class="fixed inset-0 bg-gray-900/75 backdrop-blur-sm z-50 flex items-center justify-center p-4"
>
  <div
    class="relative w-full max-w-md bg-white dark:bg-slate-900 rounded-xl shadow-xl"
  >
    <!-- Header -->
    <div
      class="bg-gradient-to-r from-purple-600 to-indigo-600 shadow-lg shadow-purple-500/20 transition-all duration-300 rounded-t-xl"
    >
      <div class="flex items-center justify-between p-4">
        <h3 class="text-lg font-black text-white uppercase tracking-[0.1em]">
          {{ modalTitle }}
        </h3>
        <button
          (click)="onCloseClick()"
          type="button"
          class="text-white/80 hover:text-white hover:bg-white/10 rounded-lg p-1 transition-colors"
          [disabled]="isLoading"
        >
          <svg
            class="w-5 h-5"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
          <span class="sr-only">Close modal</span>
        </button>
      </div>
    </div>

    <!-- Form -->
    <form class="p-4" (ngSubmit)="submitForm()" #customerForm="ngForm">
      <div class="space-y-4">
        <!-- Full Name -->
        <div>
          <label
            for="fullName"
            class="block mb-1.5 text-sm font-medium text-gray-700 dark:text-gray-200"
          >
            Full Name
          </label>
          <input
            type="text"
            name="fullName"
            id="fullName"
            [(ngModel)]="customerDetails.fullName"
            [disabled]="isLoading"
            class="w-full px-3 py-2 bg-gray-50 dark:bg-slate-900 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors disabled:opacity-60"
            placeholder="Enter full name"
            required
          />
        </div>

        <!-- Email -->
        <div>
          <label
            for="email"
            class="block mb-1.5 text-sm font-medium text-gray-700 dark:text-gray-200"
          >
            Email Address
          </label>
          <input
            type="email"
            name="email"
            id="email"
            [(ngModel)]="customerDetails.email"
            [disabled]="isLoading"
            class="w-full px-3 py-2 bg-gray-50 dark:bg-slate-900 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors disabled:opacity-60"
            placeholder="customer@example.com"
          />
        </div>

        <!-- Phone, Status and Customer Type Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <!-- Phone Number -->
          <div>
            <label
              for="phoneNumber"
              class="block mb-1.5 text-sm font-medium text-gray-700 dark:text-gray-200"
            >
              Phone Number
            </label>
            <input
              type="text"
              name="phoneNumber"
              id="phoneNumber"
              [(ngModel)]="customerDetails.phoneNumber"
              [disabled]="isLoading"
              class="w-full px-3 py-2 bg-gray-50 dark:bg-slate-900 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors disabled:opacity-60"
              placeholder="Enter phone number"
              required
            />
          </div>

          <!-- Status -->
          <div>
            <label
              for="isActive"
              class="block mb-1.5 text-sm font-medium text-gray-700 dark:text-gray-200"
            >
              Status
            </label>
            <select
              id="isActive"
              name="isActive"
              [(ngModel)]="customerDetails.isActive"
              (change)="convertIsActive($event)"
              [disabled]="isLoading"
              class="w-full px-3 py-2 bg-gray-50 dark:bg-slate-900 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors disabled:opacity-60"
            >
              <option [ngValue]="true">Active</option>
              <option [ngValue]="false">Inactive</option>
            </select>
          </div>
        </div>

        <!-- Customer Type -->
        <div>
          <label
            class="block mb-1.5 text-sm font-medium text-gray-700 dark:text-gray-200"
          >
            Customer Type
          </label>
          <div class="grid grid-cols-2 gap-3">
            <button
              type="button"
              (click)="customerDetails.customerType = 'INDIVIDUAL'"
              [disabled]="isLoading"
              [class]="
                customerDetails.customerType === 'INDIVIDUAL'
                  ? 'flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg border-2 border-blue-500 bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 font-medium text-sm transition-all'
                  : 'flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg border-2 border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-slate-900 text-gray-700 dark:text-gray-300 font-medium text-sm transition-all hover:border-blue-400'
              "
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                />
              </svg>
              Individual
            </button>
            <button
              type="button"
              (click)="customerDetails.customerType = 'BUSINESS'"
              [disabled]="isLoading"
              [class]="
                customerDetails.customerType === 'BUSINESS'
                  ? 'flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg border-2 border-purple-500 bg-purple-50 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300 font-medium text-sm transition-all'
                  : 'flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg border-2 border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-slate-900 text-gray-700 dark:text-gray-300 font-medium text-sm transition-all hover:border-purple-400'
              "
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"
                />
              </svg>
              Business
            </button>
          </div>
        </div>

        <!-- KRA PIN (Optional) -->
        <div>
          <label
            for="kraPin"
            class="block mb-1.5 text-sm font-medium text-gray-700 dark:text-gray-200"
          >
            KRA PIN
            <span
              class="ml-1 text-xs font-normal text-gray-500 dark:text-gray-400"
              >(Optional)</span
            >
          </label>
          <div class="relative">
            <input
              type="text"
              name="kraPin"
              id="kraPin"
              [ngModel]="customerDetails.kraPin"
              (input)="formatKraPin($event)"
              [disabled]="isLoading"
              [placeholder]="kraPinPlaceholder"
              [pattern]="kraPinPattern"
              maxlength="11"
              class="w-full px-3 py-2 bg-gray-50 dark:bg-slate-900 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors disabled:opacity-60 font-mono tracking-widest uppercase pr-20"
              #kraPinRef="ngModel"
            />
            <span
              class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-mono"
              [class]="
                customerDetails.kraPin && customerDetails.kraPin.length === 11
                  ? 'text-green-500'
                  : 'text-gray-400 dark:text-gray-500'
              "
            >
              {{ (customerDetails.kraPin || "").length }}/11
            </span>
          </div>
          <p
            *ngIf="kraPinRef.invalid && kraPinRef.dirty"
            class="mt-1 text-xs text-red-500"
          >
            Invalid PIN format. {{ kraPinHint }}
          </p>
          <p
            *ngIf="!kraPinRef.invalid || !kraPinRef.dirty"
            class="mt-1 text-xs text-gray-500 dark:text-gray-400"
          >
            {{ kraPinHint }}
          </p>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="mt-6">
        <button
          type="submit"
          [disabled]="isLoading || !customerForm.valid"
          class="w-full px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg flex items-center justify-center space-x-2 transition-colors disabled:opacity-60 disabled:cursor-not-allowed"
        >
          <svg
            *ngIf="isLoading"
            class="animate-spin h-5 w-5 text-white"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            ></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
            ></path>
          </svg>
          <span>{{ submitButtonText }}</span>
        </button>
      </div>
    </form>
  </div>
</div>

<div
  class="relative overflow-x-auto shadow-md sm:rounded-lg bg-white dark:bg-slate-900 min-h-screen p-6"
>
  <!-- Header Section -->
  <div class="flex flex-col md:flex-row justify-between gap-4 mb-6">
    <!-- Search Section -->
    <div class="relative">
      <div
        class="absolute inset-y-0 rtl:inset-r-0 start-0 flex items-center ps-3 pointer-events-none"
      >
        <svg
          class="w-4 h-4 text-gray-400"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 20 20"
        >
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"
          />
        </svg>
      </div>
      <input
        (input)="onInputChange()"
        [(ngModel)]="query"
        type="text"
        class="block w-full ps-10 py-3 text-sm rounded-lg bg-gray-50 dark:bg-slate-800 border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 focus:ring-blue-500 focus:border-blue-500"
        placeholder="Search suppliers..."
        [class.opacity-50]="isSearching"
        [disabled]="isSearching"
      />
      <div *ngIf="isSearching" class="absolute right-3 top-3">
        <svg
          class="animate-spin h-5 w-5 text-blue-500"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
          ></path>
        </svg>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="flex flex-col sm:flex-row gap-3">
      <button
        (click)="printSelected()"
        [disabled]="selectedSuppliers.size === 0"
        class="flex items-center justify-center px-5 py-3 text-sm text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-slate-800 rounded-lg gap-x-2 hover:bg-gray-200 dark:hover:bg-gray-700 focus:ring-2 focus:ring-gray-500 dark:focus:ring-gray-700 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <svg
          width="20"
          height="20"
          viewBox="0 0 20 20"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M13.3333 13.3332L9.99997 9.9999M9.99997 9.9999L6.66663 13.3332M9.99997 9.9999V17.4999M16.9916 15.3249C17.8044 14.8818 18.4465 14.1806 18.8165 13.3321C19.1866 12.4835 19.2635 11.5359 19.0351 10.6388C18.8068 9.7417 18.2862 8.94616 17.5555 8.37778C16.8248 7.80939 15.9257 7.50052 15 7.4999H13.95C13.6977 6.52427 13.2276 5.61852 12.5749 4.85073C11.9222 4.08295 11.104 3.47311 10.1817 3.06708C9.25943 2.66104 8.25709 2.46937 7.25006 2.50647C6.24304 2.54358 5.25752 2.80849 4.36761 3.28129C3.47771 3.7541 2.70656 4.42249 2.11215 5.23622C1.51774 6.04996 1.11554 6.98785 0.935783 7.9794C0.756025 8.97095 0.803388 9.99035 1.07431 10.961C1.34523 11.9316 1.83267 12.8281 2.49997 13.5832"
            stroke="currentColor"
            stroke-width="1.67"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span>Print Selected ({{ selectedSuppliers.size }})</span>
      </button>

      <button
        (click)="toggleModal()"
        class="flex items-center justify-center px-5 py-3 text-sm text-white bg-blue-600 rounded-lg gap-x-2 hover:bg-blue-700 focus:ring-2 focus:ring-blue-500"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="w-5 h-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
        <span>Add Supplier</span>
      </button>
    </div>
  </div>

  <!-- Table Section -->
  <div class="relative overflow-hidden rounded-lg">
    <!-- Loading Overlay -->
    <div
      *ngIf="isLoading"
      class="absolute inset-0 bg-white dark:bg-slate-900 bg-opacity-50 flex items-center justify-center z-10"
    >
      <div class="flex flex-col items-center">
        <svg
          class="animate-spin h-8 w-8 text-blue-500 mb-4"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
          ></path>
        </svg>
        <span class="text-white">Loading suppliers...</span>
      </div>
    </div>

    <table class="w-full text-sm text-left text-gray-900 dark:text-gray-300">
      <thead class="bg-gradient-to-r from-purple-600 to-indigo-600 shadow-lg shadow-purple-500/20 transition-all duration-300">
        <tr>
          <th scope="col" class="p-4">
            <div class="flex items-center">
              <input
                (change)="toggleSelectAll($event)"
                [checked]="
                  selectedSuppliers.size === suppliers.length &&
                  suppliers.length > 0
                "
                type="checkbox"
                class="w-4 h-4 text-white border-white/30 rounded bg-white/10 focus:ring-purple-400"
              />
            </div>
          </th>
          <th scope="col" class="px-6 py-4 text-xs font-black text-left text-white uppercase tracking-[0.1em]">Supplier name</th>
          <th scope="col" class="px-6 py-4 text-xs font-black text-left text-white uppercase tracking-[0.1em]">Phone</th>
          <th scope="col" class="px-6 py-4 text-xs font-black text-left text-white uppercase tracking-[0.1em]">Total Unpaid</th>
          <th scope="col" class="px-6 py-4 text-xs font-black text-left text-white uppercase tracking-[0.1em]">Status</th>
          <th scope="col" class="px-6 py-4 text-xs font-black text-left text-white uppercase tracking-[0.1em]">Action</th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let supplier of suppliers"
          class="border-b border-gray-200 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors"
        >
          <td class="w-4 p-4">
            <div class="flex items-center">
              <input
                [checked]="isSelected(supplier.id.toString())"
                (change)="toggleSelectSupplier(supplier.id.toString())"
                type="checkbox"
                class="w-4 h-4 text-blue-600 rounded bg-gray-100 dark:bg-gray-700 border-gray-300 dark:border-gray-600 focus:ring-blue-600 focus:ring-2"
              />
            </div>
          </td>
          <th
            scope="row"
            class="px-6 py-4 font-medium text-gray-900 dark:text-white whitespace-nowrap"
          >
            {{ supplier.name }}
          </th>
          <td class="px-6 py-4">{{ supplier.phone }}</td>
          <td class="px-6 py-4">{{ supplier.totalUnpaidSuppliers }}</td>
          <td class="px-6 py-4">
            <span
              [class]="
                supplier.deleted
                  ? 'bg-red-100 dark:bg-red-900 text-red-800 dark:text-red-300'
                  : 'bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-300'
              "
              class="px-2 py-1 rounded-full text-xs font-medium"
            >
              {{ supplier.deleted ? "Inactive" : "Active" }}
            </span>
          </td>
          <td class="px-6 py-4">
            <button
              (click)="toggleEditModal(supplier.id)"
              class="font-medium text-blue-600 dark:text-blue-500 hover:text-blue-800 dark:hover:text-blue-400 hover:underline focus:outline-none focus:text-blue-300 dark:focus:text-blue-200"
            >
              Edit
            </button>
          </td>
        </tr>

        <!-- Empty State -->
        <tr *ngIf="suppliers.length === 0 && !isLoading">
          <td colspan="6" class="px-6 py-8 text-center text-gray-500 dark:text-gray-400">
            <div class="flex flex-col items-center">
              <svg
                class="w-12 h-12 mb-4"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"
                />
              </svg>
              <p class="text-lg font-medium">No suppliers found</p>
              <p class="text-sm mt-1">
                {{
                  query
                    ? "Try adjusting your search"
                    : "Start by adding a new supplier"
                }}
              </p>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<app-add-suplliers
  [modalId]="'supplier-modal'"
  [isModalVisible]="isModalVisible"
  (toggleModal)="toggleModal()"
></app-add-suplliers>

<app-update-suplliers
  [modalId]="'student-modal'"
  [supplierIdToEdit]="supllierIdToEdit"
  [isModalVisible]="isEditModalVisible"
  (toggleModal)="toggleEditModal(supllierIdToEdit)"
></app-update-suplliers>

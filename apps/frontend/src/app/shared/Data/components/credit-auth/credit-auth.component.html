<div
  class="flex flex-col bg-gray-900 text-gray-100 rounded-lg p-6 shadow-lg"
  [class.dark]="isDarkMode"
>
  <!-- Header with Close and Dark Mode Toggle -->
  <div class="flex justify-between items-center mb-6">
    <button
      (click)="toggleDarkMode()"
      class="px-3 py-1 rounded-lg bg-gray-700 text-gray-200 hover:bg-gray-600 text-sm transition-colors"
    >
      {{ isDarkMode ? "Light Mode" : "Dark Mode" }}
    </button>

    <button
      (click)="close()"
      class="p-2 rounded-full hover:bg-gray-700/50 transition-colors group"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="text-gray-400 group-hover:text-red-400 transition-colors"
      >
        <path d="M18 6 6 18" />
        <path d="m6 6 12 12" />
      </svg>
    </button>
  </div>

  <!-- Form -->
  <form (ngSubmit)="onSubmit()" class="space-y-6 w-full max-w-sm mx-auto">
    <div class="space-y-2">
      <label for="password" class="block text-sm font-medium text-gray-200">
        Confirm Your Password to Complete Credit Sale
      </label>

      <div class="relative">
        <!-- Lock Icon -->
        <div
          class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="text-gray-400"
          >
            <circle cx="12" cy="16" r="1" />
            <rect x="3" y="10" width="18" height="12" rx="2" />
            <path d="M7 10V7a5 5 0 0 1 10 0v3" />
          </svg>
        </div>

        <!-- Password Input -->
        <input
          [(ngModel)]="password"
          [type]="showPassword ? 'text' : 'password'"
          id="password"
          name="password"
          class="w-full pl-10 pr-10 py-2.5 bg-gray-800 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-gray-100 placeholder-gray-400"
          placeholder="Enter your password"
        />

        <!-- Show/Hide Password Toggle -->
        <button
          type="button"
          (click)="togglePasswordVisibility()"
          class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-300"
        >
          <svg
            *ngIf="!showPassword"
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          <svg
            *ngIf="showPassword"
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
            <path
              d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"
            />
            <path
              d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"
            />
            <line x1="2" x2="22" y1="2" y2="22" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Submit Button -->
    <div class="flex justify-end">
      <button
        type="submit"
        [disabled]="posting || !password"
        class="px-5 py-2.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-gray-900 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      >
        <ng-container *ngIf="!posting"> Submit </ng-container>
        <app-btn-loder *ngIf="posting"></app-btn-loder>
      </button>
    </div>
  </form>
</div>

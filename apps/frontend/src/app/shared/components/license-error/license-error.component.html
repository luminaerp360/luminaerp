<div
  class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4"
>
  <div
    class="bg-gray-900 rounded-2xl border border-red-500/50 shadow-2xl max-w-md w-full p-8 relative overflow-hidden"
  >
    <!-- Animated background effect -->
    <div
      class="absolute inset-0 bg-gradient-to-r from-red-900/10 to-orange-900/10 animate-pulse"
    ></div>

    <div class="relative z-10">
      <!-- Warning Icon -->
      <div class="flex justify-center mb-6">
        <div
          class="w-20 h-20 rounded-full bg-red-500/20 flex items-center justify-center"
        >
          <svg
            class="w-10 h-10 text-red-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
            />
          </svg>
        </div>
      </div>

      <!-- Title -->
      <h3 class="text-2xl font-bold text-red-400 text-center mb-4">
        License Validation Failed
      </h3>

      <!-- Error Message -->
      <p
        class="text-gray-300 text-center mb-6 leading-relaxed"
        *ngIf="errorMessage"
      >
        {{ errorMessage }}
      </p>
      <p
        class="text-gray-300 text-center mb-6 leading-relaxed"
        *ngIf="!errorMessage"
      >
        Unable to validate your license. Please try again or contact support.
      </p>

      <!-- Error Details -->
      <div
        *ngIf="errorCode"
        class="bg-gray-800/50 rounded-lg p-4 mb-6 border border-gray-700/50"
      >
        <div class="text-sm">
          <span class="text-gray-400">Error Code:</span>
          <span class="text-red-400 ml-2 font-medium">{{ errorCode }}</span>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex flex-col space-y-3">
        <button
          (click)="retryValidation()"
          [disabled]="isValidating"
          class="relative w-full py-3 px-4 text-white font-semibold bg-gradient-to-r from-red-600 to-orange-600 rounded-lg hover:from-red-500 hover:to-orange-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 focus:ring-offset-gray-900 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <span [class.opacity-0]="isValidating">Retry Validation</span>
          <!-- Loading Spinner -->
          <div
            *ngIf="isValidating"
            class="absolute inset-0 flex items-center justify-center"
          >
            <svg
              class="animate-spin h-5 w-5 text-white"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
          </div>
        </button>
      </div>

      <!-- Support Contact Info -->
      <div class="mt-6 text-center">
        <p class="text-sm text-gray-400">
          Need help? Contact support at<br />
          <a
            href="mailto:support@dasadove.com"
            class="text-cyan-400 hover:text-cyan-300 transition-colors"
          >
            support&#64;dasadovesystems.co.ke</a
          >
        </p>
      </div>
    </div>
  </div>
</div>
